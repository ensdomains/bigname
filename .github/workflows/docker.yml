name: Docker Image

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  RUST_VERSION: 1.93.1

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image metadata
        id: image
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${HEAD_SHA::7}"
          {
            echo "name=$image"
            echo "tags<<EOF"
            echo "$image:$short_sha"
            echo "$image:latest"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY"
            echo "org.opencontainers.image.revision=$HEAD_SHA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            RUST_VERSION=${{ env.RUST_VERSION }}
            BIGNAME_BUILD_SHA=${{ github.event.workflow_run.head_sha }}
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.image.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
