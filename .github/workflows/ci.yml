name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  RUST_VERSION: 1.93.1
  FOUNDRY_VERSION: v1.7.1
  SCCACHE_GHA_ENABLED: "true"

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy,rustfmt

      - name: Set up sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Fall back without sccache
        if: steps.sccache.outcome != 'success'
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo fmt (e2e workspace)
        run: cargo fmt --manifest-path tests/e2e/Cargo.toml -- --check

      - name: Rust source size ratchet
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ -n "$BASE_REF" ]; then
            git fetch --no-tags --depth=1 origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            ./scripts/check-rust-file-size --base-ref "refs/remotes/origin/${BASE_REF}"
          else
            ./scripts/check-rust-file-size
          fi

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev

      - name: cargo check
        run: cargo check --workspace --all-targets --all-features

      - name: cargo check (e2e workspace)
        run: cargo check --manifest-path tests/e2e/Cargo.toml --locked --all-targets

      - name: cargo clippy (strict workspace packages)
        run: cargo clippy --workspace --all-targets --all-features --exclude bigname-adapters --no-deps -- -D warnings

      # The adapter crate still carries pre-existing warning classes. Deny
      # every other warning here so new lint classes cannot silently widen the
      # baseline while those targeted classes are paid down.
      - name: cargo clippy (adapter warning-class baseline)
        run: >-
          cargo clippy -p bigname-adapters --all-targets --all-features --
          -D warnings
          -A clippy::unusual-byte-groupings
          -A clippy::too-many-arguments
          -A clippy::needless-question-mark
          -A clippy::collapsible-if
          -A clippy::needless-borrows-for-generic-args
          -A clippy::explicit-auto-deref
          -A clippy::needless-borrow
          -A clippy::filter-map-bool-then
          -A clippy::match-like-matches-macro
          -A clippy::borrow-deref-ref
          -A clippy::needless-option-as-deref
          -A clippy::needless-return
          -A clippy::redundant-closure
          -A clippy::bool-assert-comparison
          -A clippy::cloned-ref-to-slice-refs

      - name: cargo clippy (e2e workspace)
        run: cargo clippy --manifest-path tests/e2e/Cargo.toml --locked --all-targets -- -D warnings

  test_shard:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            packages: "-p bigname-api"
          - name: indexer
            packages: "-p bigname-indexer"
          - name: worker
            packages: "-p bigname-worker"
          - name: core
            packages: >-
              -p bigname-domain
              -p bigname-storage
              -p bigname-manifests
              -p bigname-adapters
              -p bigname-execution
              -p bigname-test-support
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bigname
          POSTGRES_USER: bigname
          POSTGRES_PASSWORD: bigname
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bigname -d bigname"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BIGNAME_DATABASE_URL: postgres://bigname:bigname@127.0.0.1:5432/bigname
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev

      - name: Set up sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Fall back without sccache
        if: steps.sccache.outcome != 'success'
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test ${{ matrix.packages }} --all-features

  conformance:
    name: test (conformance)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bigname
          POSTGRES_USER: bigname
          POSTGRES_PASSWORD: bigname
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bigname -d bigname"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BIGNAME_DATABASE_URL: postgres://bigname:bigname@127.0.0.1:5432/bigname
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev

      - name: Set up sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Fall back without sccache
        if: steps.sccache.outcome != 'success'
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test conformance
        run: cargo test --manifest-path tests/conformance/Cargo.toml --locked

  e2e:
    name: test (e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bigname
          POSTGRES_USER: bigname
          POSTGRES_PASSWORD: bigname
          POSTGRES_INITDB_ARGS: "--set=max_connections=300"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bigname -d bigname"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BIGNAME_DATABASE_URL: postgres://bigname:bigname@127.0.0.1:5432/bigname
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev

      - name: Install foundry (anvil)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Set up sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Fall back without sccache
        if: steps.sccache.outcome != 'success'
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Sync pinned upstream checkouts
        run: |
          scripts/sync-refs
          scripts/sync-refs --check

      - name: Prebuild pipeline binaries
        run: cargo build --package bigname-indexer --package bigname-worker --package bigname-api

      - name: cargo test e2e
        run: cargo test --manifest-path tests/e2e/Cargo.toml --locked -- --test-threads=8

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - test_shard
      - conformance
      - e2e
    if: always()
    steps:
      - name: Check test shards
        run: |
          if [ "${{ needs.test_shard.result }}" != "success" ]; then
            echo "test shards finished with result: ${{ needs.test_shard.result }}"
            exit 1
          fi
          if [ "${{ needs.conformance.result }}" != "success" ]; then
            echo "conformance finished with result: ${{ needs.conformance.result }}"
            exit 1
          fi
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "e2e finished with result: ${{ needs.e2e.result }}"
            exit 1
          fi

  artifacts-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bigname
          POSTGRES_USER: bigname
          POSTGRES_PASSWORD: bigname
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bigname -d bigname"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BIGNAME_DATABASE_URL: postgres://bigname:bigname@127.0.0.1:5432/bigname
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Set up sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Fall back without sccache
        if: steps.sccache.outcome != 'success'
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: verify OpenAPI artifact drift
        run: |
          cargo run -p bigname-api -- print-openapi > /tmp/api-v1.openapi.json
          diff -u docs/api-v1.openapi.json /tmp/api-v1.openapi.json

      - name: verify migrations
        run: cargo run -p bigname-worker -- migrate

      - name: Fetch smoke dependencies
        run: |
          cargo fetch --locked
          cargo fetch --locked --manifest-path tests/conformance/Cargo.toml

      - name: Sync upstream refs
        run: scripts/sync-refs

      - name: release smoke gate (no network)
        run: ./scripts/release-smoke --no-network

      - name: rollback smoke gate (no network)
        run: ./scripts/rollback-smoke --no-network

  manager-graphql-compat:
    # Guards that bigname's GraphQL schema still serves every field the ENS
    # Manager's operations ask for. Validates the Manager's committed operation
    # documents (pulled from apps-monorepo) against bigname's committed SDL
    # fixture. This is a subset check ("does bigname serve what the Manager
    # needs"), not a schema-to-schema diff — bigname is deliberately a subset,
    # so a diff would be all noise. A breaking schema change (removed/renamed
    # field the Manager reads) fails this job; adding or removing a
    # bigname-private field the Manager never reads does not.
    name: Manager GraphQL compat
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GitHub withholds repository secrets (except GITHUB_TOKEN) from
    # fork-originated pull_request runs, so the private apps-monorepo checkout
    # below cannot authenticate on external-fork PRs. Skip the job cleanly for
    # those instead of failing at checkout; it still runs for same-repo
    # branches and on every push to main, so a fork-merged regression is
    # caught on main immediately. (Skipped jobs satisfy required checks, so
    # making this check required would not block external contributors.)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout bigname
        uses: actions/checkout@v4

      - name: Checkout Manager operation documents
        uses: actions/checkout@v4
        with:
          repository: ensdomains/apps-monorepo
          # Pinned deliberately so bigname CI does not flake red on every
          # Manager edit; bump this when the Manager's indexer documents change.
          ref: 759860f5acc62ea287b0feefa23c0d17aeb862a9
          # apps-monorepo is private; this checkout needs a fine-grained PAT /
          # GitHub App token with contents:read on ensdomains/apps-monorepo.
          token: ${{ secrets.APPS_MONOREPO_READ_TOKEN }}
          path: apps-monorepo
          # Only the operation documents are needed — keep the checkout minimal.
          sparse-checkout: packages/indexer/documents
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Manager operations against bigname schema
        run: |
          npx -y -p @graphql-inspector/cli@6.0.8 -p graphql@16.14.2 graphql-inspector validate \
            'apps-monorepo/packages/indexer/documents/**/*.graphql' \
            apps/api/src/tests/fixtures/subgraph_schema.graphql
