name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bigname
          POSTGRES_USER: bigname
          POSTGRES_PASSWORD: bigname
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bigname -d bigname"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BIGNAME_DATABASE_URL: postgres://bigname:bigname@127.0.0.1:5432/bigname
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Rust workspace
        id: workspace
        run: |
          if [ -f Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No root Cargo.toml found; skipping Rust CI bootstrap checks."
          fi

      - name: Install stable Rust
        if: steps.workspace.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        if: steps.workspace.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        if: steps.workspace.outputs.present == 'true'
        run: cargo fmt --check

      - name: Rust source size ratchet
        if: steps.workspace.outputs.present == 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ -n "$BASE_REF" ]; then
            git fetch --no-tags --depth=1 origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            ./scripts/check-rust-file-size --base-ref "refs/remotes/origin/${BASE_REF}"
          else
            ./scripts/check-rust-file-size
          fi

      - name: cargo clippy
        if: steps.workspace.outputs.present == 'true'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        if: steps.workspace.outputs.present == 'true'
        run: cargo test --workspace --all-features

      - name: verify OpenAPI artifact drift
        if: steps.workspace.outputs.present == 'true'
        run: |
          cargo run -p bigname-api -- print-openapi > /tmp/api-v1.openapi.json
          diff -u docs/api-v1.openapi.json /tmp/api-v1.openapi.json

      - name: verify migrations
        if: steps.workspace.outputs.present == 'true'
        run: cargo run -p bigname-worker -- migrate

      - name: release smoke gate (no network)
        if: steps.workspace.outputs.present == 'true'
        run: ./scripts/release-smoke --no-network

      - name: rollback smoke gate (no network)
        if: steps.workspace.outputs.present == 'true'
        run: ./scripts/rollback-smoke --no-network
