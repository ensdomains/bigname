name: bigname

x-bigname-env: &bigname-env
  BIGNAME_DATABASE_URL: ${BIGNAME_DATABASE_URL:-postgresql://bigname:bigname@postgres:5432/bigname}
  BIGNAME_DATABASE_MAX_CONNECTIONS: ${BIGNAME_DATABASE_MAX_CONNECTIONS:-10}
  RUST_LOG: ${RUST_LOG:-info,sqlx::query=error}

x-bigname-service: &bigname-service
  image: ${BIGNAME_IMAGE:-ghcr.io/tateb/bigname:latest}
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: ${POSTGRES_SHM_SIZE:-8gb}
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-8GB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-96GB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-1GB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-16MB}
      - -c
      - wal_buffers=${POSTGRES_WAL_BUFFERS:-64MB}
      - -c
      - max_wal_size=${POSTGRES_MAX_WAL_SIZE:-32GB}
      - -c
      - min_wal_size=${POSTGRES_MIN_WAL_SIZE:-4GB}
      - -c
      - checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-15min}
      - -c
      - checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - wal_compression=${POSTGRES_WAL_COMPRESSION:-on}
      - -c
      - effective_io_concurrency=${POSTGRES_EFFECTIVE_IO_CONCURRENCY:-256}
      - -c
      - random_page_cost=${POSTGRES_RANDOM_PAGE_COST:-1.1}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bigname}
      POSTGRES_USER: ${POSTGRES_USER:-bigname}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bigname}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-bigname} -d ${POSTGRES_DB:-bigname}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    <<: *bigname-service
    command: migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *bigname-env

  api:
    <<: *bigname-service
    command: api
    ports:
      - "${BIGNAME_API_HOST:-0.0.0.0}:${BIGNAME_API_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *bigname-env
      BIGNAME_API_BIND_ADDR: ${BIGNAME_API_BIND_ADDR:-0.0.0.0:3000}
      BIGNAME_API_CHAIN_RPC_URLS: ${BIGNAME_API_CHAIN_RPC_URLS:-}
      BIGNAME_API_IDENTITY_BATCH_LIMIT: ${BIGNAME_API_IDENTITY_BATCH_LIMIT:-1000}
      BIGNAME_API_LOOKUP_BATCH_LIMIT: ${BIGNAME_API_LOOKUP_BATCH_LIMIT:-1000}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS "http://127.0.0.1:$${BIGNAME_API_BIND_ADDR##*:}/healthz" | grep -q '"status":"ready"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  indexer:
    <<: *bigname-service
    command: indexer
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *bigname-env
      BIGNAME_INDEXER_MANIFESTS_ROOT: ${BIGNAME_INDEXER_MANIFESTS_ROOT:-/app/manifests/mainnet}
      BIGNAME_INDEXER_POLL_INTERVAL_SECS: ${BIGNAME_INDEXER_POLL_INTERVAL_SECS:-5}
      BIGNAME_INDEXER_RAW_CODE_BASELINE_MAX_ADDRESSES_PER_TICK: ${BIGNAME_INDEXER_RAW_CODE_BASELINE_MAX_ADDRESSES_PER_TICK:-2048}
      BIGNAME_INDEXER_HASH_PINNED_BACKFILL_CHUNK_BLOCKS: ${BIGNAME_INDEXER_HASH_PINNED_BACKFILL_CHUNK_BLOCKS:-1024}
      BIGNAME_INDEXER_HASH_PINNED_BACKFILL_MAX_LOGS_PER_PUSH: ${BIGNAME_INDEXER_HASH_PINNED_BACKFILL_MAX_LOGS_PER_PUSH:-10000}
      BIGNAME_INDEXER_HASH_PINNED_BACKFILL_MAX_LOGS_PER_RANGE: ${BIGNAME_INDEXER_HASH_PINNED_BACKFILL_MAX_LOGS_PER_RANGE:-}
      BIGNAME_INDEXER_HASH_PINNED_BACKFILL_ADAPTER_SYNC: ${BIGNAME_INDEXER_HASH_PINNED_BACKFILL_ADAPTER_SYNC:-auto}
      BIGNAME_INDEXER_BOOTSTRAP_BACKFILL_WORKERS: ${BIGNAME_INDEXER_BOOTSTRAP_BACKFILL_WORKERS:-0}
      BIGNAME_INDEXER_BOOTSTRAP_BACKFILL_RANGE_BLOCKS: ${BIGNAME_INDEXER_BOOTSTRAP_BACKFILL_RANGE_BLOCKS:-50000}
      BIGNAME_INDEXER_NORMALIZED_REPLAY_CATCHUP_ENABLED: ${BIGNAME_INDEXER_NORMALIZED_REPLAY_CATCHUP_ENABLED:-true}
      BIGNAME_INDEXER_NORMALIZED_REPLAY_CATCHUP_CHUNK_BLOCKS: ${BIGNAME_INDEXER_NORMALIZED_REPLAY_CATCHUP_CHUNK_BLOCKS:-262144}
      BIGNAME_INDEXER_NORMALIZED_REPLAY_CATCHUP_MAX_LOGS_PER_CHUNK: ${BIGNAME_INDEXER_NORMALIZED_REPLAY_CATCHUP_MAX_LOGS_PER_CHUNK:-100000}
      BIGNAME_INDEXER_NORMALIZED_REPLAY_CATCHUP_POLL_INTERVAL_SECS: ${BIGNAME_INDEXER_NORMALIZED_REPLAY_CATCHUP_POLL_INTERVAL_SECS:-5}
      BIGNAME_INDEXER_NORMALIZED_REPLAY_DEFER_PROJECTION_INDEXES: ${BIGNAME_INDEXER_NORMALIZED_REPLAY_DEFER_PROJECTION_INDEXES:-true}
      BIGNAME_INDEXER_RETAIN_HEADER_AUDIT_FIELDS: ${BIGNAME_INDEXER_RETAIN_HEADER_AUDIT_FIELDS:-false}
      BIGNAME_INDEXER_CHAIN_RPC_URLS: ${BIGNAME_INDEXER_CHAIN_RPC_URLS:-}
      BIGNAME_INDEXER_CHAIN_RETH_DB_SOURCES: ${BIGNAME_INDEXER_CHAIN_RETH_DB_SOURCES:-}
      BIGNAME_INDEXER_CHAIN_RPC_RECEIPT_FALLBACK_URLS: ${BIGNAME_INDEXER_CHAIN_RPC_RECEIPT_FALLBACK_URLS:-}
      BIGNAME_INDEXER_JSON_RPC_BATCH_ITEM_LIMIT: ${BIGNAME_INDEXER_JSON_RPC_BATCH_ITEM_LIMIT:-32}
      BIGNAME_INDEXER_JSON_RPC_BATCH_CONCURRENCY: ${BIGNAME_INDEXER_JSON_RPC_BATCH_CONCURRENCY:-1}
      BIGNAME_INDEXER_BACKFILL_SOURCE: ${BIGNAME_INDEXER_BACKFILL_SOURCE:-hash-pinned}
      BIGNAME_INDEXER_COINBASE_SQL_URLS: ${BIGNAME_INDEXER_COINBASE_SQL_URLS:-}
      BIGNAME_INDEXER_COINBASE_SQL_API_KEY_ID_ENV: ${BIGNAME_INDEXER_COINBASE_SQL_API_KEY_ID_ENV:-COINBASE_CDP_SQL_API_KEY_ID}
      BIGNAME_INDEXER_COINBASE_SQL_API_KEY_SECRET_ENV: ${BIGNAME_INDEXER_COINBASE_SQL_API_KEY_SECRET_ENV:-COINBASE_CDP_SQL_API_KEY_SECRET}
      BIGNAME_INDEXER_COINBASE_SQL_INITIAL_WINDOW_BLOCKS: ${BIGNAME_INDEXER_COINBASE_SQL_INITIAL_WINDOW_BLOCKS:-1024}
      BIGNAME_INDEXER_COINBASE_SQL_MAX_WINDOW_BLOCKS: ${BIGNAME_INDEXER_COINBASE_SQL_MAX_WINDOW_BLOCKS:-8192}
      BIGNAME_INDEXER_COINBASE_SQL_PAGE_LIMIT: ${BIGNAME_INDEXER_COINBASE_SQL_PAGE_LIMIT:-10000}
      BIGNAME_INDEXER_COINBASE_SQL_QUERY_CHAR_LIMIT: ${BIGNAME_INDEXER_COINBASE_SQL_QUERY_CHAR_LIMIT:-10000}
      BIGNAME_INDEXER_COINBASE_SQL_QUERY_TIMEOUT_SECS: ${BIGNAME_INDEXER_COINBASE_SQL_QUERY_TIMEOUT_SECS:-30}
      BIGNAME_INDEXER_COINBASE_SQL_RATE_LIMIT_QPS: ${BIGNAME_INDEXER_COINBASE_SQL_RATE_LIMIT_QPS:-5}
      BIGNAME_INDEXER_COINBASE_SQL_VALIDATION_MODE: ${BIGNAME_INDEXER_COINBASE_SQL_VALIDATION_MODE:-full}
      BIGNAME_INDEXER_COINBASE_SQL_WORKERS: ${BIGNAME_INDEXER_COINBASE_SQL_WORKERS:-1}
      BIGNAME_INDEXER_COINBASE_SQL_RANGE_BLOCKS: ${BIGNAME_INDEXER_COINBASE_SQL_RANGE_BLOCKS:-0}
      BIGNAME_INDEXER_OPS_CATCHUP_CHUNK_BLOCKS: ${BIGNAME_INDEXER_OPS_CATCHUP_CHUNK_BLOCKS:-32}
      BIGNAME_INDEXER_OPS_CATCHUP_FOLLOW: ${BIGNAME_INDEXER_OPS_CATCHUP_FOLLOW:-false}
      BIGNAME_INDEXER_OPS_CATCHUP_FOLLOW_ITERATIONS:
      BIGNAME_INDEXER_OPS_CATCHUP_FOLLOW_POLL_INTERVAL_SECS: ${BIGNAME_INDEXER_OPS_CATCHUP_FOLLOW_POLL_INTERVAL_SECS:-30}
      BIGNAME_INDEXER_OPS_CATCHUP_LEASE_DURATION_SECS: ${BIGNAME_INDEXER_OPS_CATCHUP_LEASE_DURATION_SECS:-300}
      BIGNAME_INDEXER_OPS_CATCHUP_POSTGRES_MAX_BYTES:
      BIGNAME_INDEXER_OPS_CATCHUP_MIN_FREE_DISK_BYTES: ${BIGNAME_INDEXER_OPS_CATCHUP_MIN_FREE_DISK_BYTES:-0}
      BIGNAME_INDEXER_OPS_CATCHUP_DISK_PATH: ${BIGNAME_INDEXER_OPS_CATCHUP_DISK_PATH:-.}
      BIGNAME_INDEXER_OPS_CATCHUP_ESTIMATED_BYTES_PER_BLOCK: ${BIGNAME_INDEXER_OPS_CATCHUP_ESTIMATED_BYTES_PER_BLOCK:-0}
      BIGNAME_INDEXER_LIVE_ADAPTER_BACKLOG_BLOCK_BATCH_SIZE: ${BIGNAME_INDEXER_LIVE_ADAPTER_BACKLOG_BLOCK_BATCH_SIZE:-1}
      COINBASE_CDP_SQL_API_KEY_ID: ${COINBASE_CDP_SQL_API_KEY_ID:-}
      COINBASE_CDP_SQL_API_KEY_SECRET: ${COINBASE_CDP_SQL_API_KEY_SECRET:-}
      BIGNAME_INDEXER_EVENT_SILENT_REVERSE_RESOLVER_ADDRESSES: ${BIGNAME_INDEXER_EVENT_SILENT_REVERSE_RESOLVER_ADDRESSES:-}
    healthcheck:
      test:
        - CMD
        - bigname-indexer
        - healthcheck
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s

  worker:
    <<: *bigname-service
    command: worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *bigname-env
      BIGNAME_WORKER_POLL_INTERVAL_SECS: ${BIGNAME_WORKER_POLL_INTERVAL_SECS:-5}
      BIGNAME_WORKER_CHAIN_RPC_URLS: ${BIGNAME_WORKER_CHAIN_RPC_URLS:-}
      BIGNAME_WORKER_TEXT_HYDRATION_MULTICALL3_ADDRESS: ${BIGNAME_WORKER_TEXT_HYDRATION_MULTICALL3_ADDRESS:-0xcA11bde05977b3631167028862bE2a173976CA11}
      BIGNAME_WORKER_TEXT_HYDRATION_BATCH_SIZE: ${BIGNAME_WORKER_TEXT_HYDRATION_BATCH_SIZE:-250}
      BIGNAME_WORKER_PRIMARY_NAME_LEGACY_REVERSE_RESOLVER_ADDRESSES: ${BIGNAME_WORKER_PRIMARY_NAME_LEGACY_REVERSE_RESOLVER_ADDRESSES:-}
      BIGNAME_WORKER_PRIMARY_NAME_LEGACY_REVERSE_HYDRATION_MULTICALL3_ADDRESS: ${BIGNAME_WORKER_PRIMARY_NAME_LEGACY_REVERSE_HYDRATION_MULTICALL3_ADDRESS:-0xcA11bde05977b3631167028862bE2a173976CA11}
      BIGNAME_WORKER_PRIMARY_NAME_LEGACY_REVERSE_HYDRATION_BATCH_SIZE: ${BIGNAME_WORKER_PRIMARY_NAME_LEGACY_REVERSE_HYDRATION_BATCH_SIZE:-250}
    healthcheck:
      test:
        - CMD
        - bigname-worker
        - healthcheck
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s

volumes:
  postgres-data:
