services:
  api:
    networks:
      - default
      - eth_archive_node

  worker:
    networks:
      - default
      - eth_archive_node

  indexer:
    entrypoint: ["/usr/local/bin/bigname"]
    ipc: host
    pid: host
    user: ${BIGNAME_INDEXER_RETH_DB_USER:-0:0}
    environment:
      BIGNAME_INDEXER_CHAIN_RPC_URLS: ""
      BIGNAME_INDEXER_CHAIN_RETH_DB_SOURCES: ${BIGNAME_INDEXER_CHAIN_RETH_DB_SOURCES:?set BIGNAME_INDEXER_CHAIN_RETH_DB_SOURCES, for example ethereum-mainnet=/reth-data}
    ulimits:
      nofile:
        soft: ${BIGNAME_INDEXER_RETH_DB_NOFILE_SOFT:-1048576}
        hard: ${BIGNAME_INDEXER_RETH_DB_NOFILE_HARD:-1048576}
    volumes:
      - ${BIGNAME_INDEXER_RETH_DATADIR_HOST:?set BIGNAME_INDEXER_RETH_DATADIR_HOST to the host Reth datadir}:${BIGNAME_INDEXER_RETH_DATADIR_CONTAINER:-/reth-data}:rw

networks:
  eth_archive_node:
    external: true
    name: eth-archive-node_default
