<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bigname API docs</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --panel-strong: #f8fafc;
        --text: #101828;
        --muted: #667085;
        --line: #d0d5dd;
        --soft: #eef2f6;
        --accent: #0f766e;
        --accent-strong: #0f4f4a;
        --accent-soft: #ccfbf1;
        --blue: #175cd3;
        --blue-soft: #d1e9ff;
        --purple: #6941c6;
        --purple-soft: #ebe9fe;
        --danger: #b42318;
        --ok: #067647;
        --warn: #b54708;
        --code-bg: #111827;
        --code-text: #f9fafb;
        --shadow: 0 1px 2px rgb(16 24 40 / 0.06);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --panel: #182230;
          --panel-strong: #111827;
          --text: #f9fafb;
          --muted: #98a2b3;
          --line: #344054;
          --soft: #202939;
          --accent: #5eead4;
          --accent-strong: #99f6e4;
          --accent-soft: #134e4a;
          --blue: #84caff;
          --blue-soft: #12386b;
          --purple: #bdb4fe;
          --purple-soft: #2e1065;
          --danger: #f97066;
          --ok: #47cd89;
          --warn: #fdb022;
          --code-bg: #0b1220;
          --code-text: #f9fafb;
          --shadow: none;
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      a {
        color: inherit;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .topbar,
      .layout {
        width: min(1360px, calc(100vw - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 460px);
        gap: 24px;
        align-items: end;
        padding: 26px 0 22px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 30px;
        font-weight: 760;
      }

      h2 {
        font-size: 18px;
        font-weight: 760;
      }

      h3 {
        font-size: 14px;
        font-weight: 760;
      }

      .meta,
      .summary,
      .empty,
      .error,
      .description,
      .hint,
      .metric-label,
      .section-description,
      .sidebar-meta,
      .route-count {
        color: var(--muted);
      }

      .meta {
        margin-top: 4px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input[type="search"],
      .field-input,
      .field-select,
      .body-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        padding: 10px 12px;
      }

      .field-input,
      .field-select {
        min-height: 42px;
      }

      .body-input {
        min-height: 180px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.45;
      }

      .body-panel,
      .schema-panel {
        display: grid;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
      }

      .body-panel-title,
      .schema-panel-title {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }

      .body-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .body-group {
        display: grid;
        gap: 12px;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }

      .body-group legend {
        padding: 0 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .body-preview {
        min-height: 120px;
      }

      .schema-table {
        font-size: 13px;
      }

      .json-link,
      .send-button,
      .clear-button,
      .docs-link {
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel);
        padding: 10px 12px;
        text-decoration: none;
        white-space: nowrap;
      }

      .json-link:hover,
      .clear-button:hover,
      .docs-link:hover,
      .sidebar-link:hover {
        border-color: var(--accent);
      }

      .send-button {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font-weight: 760;
      }

      .send-button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .clear-button {
        cursor: pointer;
      }

      .layout {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 22px;
        align-items: start;
        padding: 24px 0 52px;
      }

      .sidebar {
        position: sticky;
        top: 16px;
        display: grid;
        gap: 14px;
        max-height: calc(100vh - 32px);
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 14px;
      }

      .sidebar-header {
        display: grid;
        gap: 4px;
        padding: 2px 2px 10px;
        border-bottom: 1px solid var(--line);
      }

      .sidebar-list {
        display: grid;
        gap: 6px;
      }

      .sidebar-link {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 8px 10px;
        text-decoration: none;
      }

      .sidebar-link strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
      }

      .route-count {
        font-size: 12px;
      }

      .content {
        display: grid;
        gap: 22px;
        min-width: 0;
      }

      .overview {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .overview-item,
      .section-block,
      section.operation {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .overview-item {
        padding: 14px;
      }

      .overview-label {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .overview-value {
        display: block;
        margin-top: 4px;
        font-size: 18px;
        font-weight: 760;
      }

      .section-block {
        overflow: hidden;
      }

      .section-heading {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: start;
        padding: 18px;
        background: var(--panel-strong);
        border-bottom: 1px solid var(--line);
      }

      .section-description {
        margin-top: 4px;
      }

      .section-routes {
        display: grid;
        gap: 14px;
        padding: 14px;
      }

      section.operation {
        overflow: hidden;
        box-shadow: none;
      }

      .operation-header {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        padding: 16px;
      }

      .method {
        border-radius: 6px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        font-weight: 760;
        padding: 4px 8px;
        text-transform: uppercase;
      }

      .method.post {
        background: #ecfdf3;
        color: #067647;
      }

      .method.get {
        background: var(--blue-soft);
        color: var(--blue);
      }

      @media (prefers-color-scheme: dark) {
        .method.post {
          background: #053321;
          color: #75e0a7;
        }
      }

      .path,
      .url-preview {
        overflow-wrap: anywhere;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .path {
        font-size: 15px;
        font-weight: 700;
      }

      .summary {
        margin-top: 4px;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .tag {
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--muted);
        font-size: 12px;
        padding: 2px 8px;
      }

      details {
        border-top: 1px solid var(--line);
        padding: 0 16px 16px;
      }

      summary {
        cursor: pointer;
        font-weight: 700;
        padding: 14px 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        border-top: 1px solid var(--line);
        padding: 9px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-weight: 700;
      }

      code {
        border-radius: 6px;
        background: var(--soft);
        padding: 2px 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.92em;
      }

      pre {
        margin: 0;
        overflow: auto;
        border-radius: 8px;
        background: var(--code-bg);
        color: var(--code-text);
        padding: 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.45;
      }

      .response-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
      }

      .response-list li {
        display: grid;
        grid-template-columns: 68px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
      }

      .status-code {
        color: var(--warn);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-weight: 760;
      }

      .try-grid {
        display: grid;
        gap: 14px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field-label {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 20px;
        font-size: 13px;
        font-weight: 700;
      }

      .field-label span {
        color: var(--muted);
        font-weight: 500;
      }

      .hint {
        min-height: 18px;
        font-size: 12px;
      }

      .request-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .url-preview {
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: var(--soft);
        color: var(--text);
        padding: 10px 12px;
        font-size: 13px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        border-top: 1px solid var(--line);
        padding-top: 8px;
      }

      .metric-value {
        display: block;
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-weight: 760;
      }

      .metric-value.ok {
        color: var(--ok);
      }

      .metric-value.error {
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--danger);
      }

      .response-shell {
        display: grid;
        gap: 12px;
      }

      .empty,
      .error {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 980px) {
        .topbar,
        .layout {
          width: min(100vw - 20px, 1180px);
        }

        .topbar,
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          max-height: none;
        }

        .overview {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .toolbar,
        .operation-header,
        .response-list li,
        .field-grid,
        .body-controls,
        .metrics,
        .overview,
        .section-heading {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <div>
          <p class="eyebrow">Public read contract</p>
          <h1 id="title">bigname API docs</h1>
          <div class="meta" id="meta">Loading OpenAPI document...</div>
        </div>
        <div class="toolbar">
          <input id="filter" type="search" autocomplete="off" placeholder="Filter routes, fields, or categories">
          <a class="json-link" href="/openapi.json">OpenAPI JSON</a>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" aria-label="API sections">
        <div class="sidebar-header">
          <h2>Sections</h2>
          <div class="sidebar-meta" id="sidebar-meta">Loading...</div>
        </div>
        <nav class="sidebar-list" id="sidebar-list"></nav>
      </aside>

      <main class="content" id="content">
        <div class="empty">Loading routes...</div>
      </main>
    </div>

    <script>
      const specUrl = "/openapi.json";
      const content = document.getElementById("content");
      const title = document.getElementById("title");
      const meta = document.getElementById("meta");
      const filter = document.getElementById("filter");
      const sidebarList = document.getElementById("sidebar-list");
      const sidebarMeta = document.getElementById("sidebar-meta");
      let spec = null;

      const methodOrder = {
        get: 0,
        post: 1,
        put: 2,
        patch: 3,
        delete: 4,
        options: 5,
        head: 6,
        trace: 7
      };

      const categoryDefinitions = [
        {
          id: "identity-status",
          title: "Native Identity And Status",
          description: "Latency-critical identity lookups and projection freshness for partner feeds and app surfaces.",
          matches: [
            /^\/v1\/identity:lookup$/,
            /^\/v1\/status$/
          ]
        },
        {
          id: "canonical-reads",
          title: "Canonical Product Reads",
          description: "Stable name, address, primary-name, permissions, and event reads for app and explorer screens.",
          matches: [
            /^\/v1\/names$/,
            /^\/v1\/names\/\{namespace\}\/\{name\}$/,
            /^\/v1\/profiles\/names\/\{name\}$/,
            /^\/v1\/names\/\{namespace\}\/\{name\}\/records$/,
            /^\/v1\/names\/\{namespace\}\/\{name\}\/children$/,
            /^\/v1\/addresses\/\{address\}\/names$/,
            /^\/v1\/primary-names\/\{address\}$/,
            /^\/v1\/resources\/\{resource_id\}\/permissions$/,
            /^\/v1\/events$/
          ]
        },
        {
          id: "diagnostics",
          title: "Coverage And Explain",
          description: "Completeness, derivation, and execution diagnostics separated from normal read paths.",
          matches: [
            /^\/v1\/coverage\//,
            /^\/v1\/explain\//
          ]
        },
        {
          id: "metadata-control",
          title: "Metadata And Health",
          description: "Namespace metadata, manifest publication, and process/database liveness.",
          matches: [
            /^\/v1\/namespaces\//,
            /^\/v1\/manifests\//,
            /^\/healthz$/
          ]
        },
        {
          id: "explorer-audit",
          title: "Explorer And Audit",
          description: "Specialist history and role views that remain outside the partner latency path.",
          matches: [
            /^\/v1\/history\//,
            /^\/v1\/names\/\{namespace\}\/\{name\}\/roles$/,
            /^\/v1\/resources\/lookup$/,
            /^\/v1\/resolvers\/\{chain_id\}\/\{resolver_address\}\/overview$/,
            /^\/v1\/roles$/
          ]
        }
      ];

      const sampleValues = {
        address: "0x8e8Db5CcEF88cca9d624701Db544989C996E3216",
        chain_id: "ethereum-mainnet",
        coin_type: "60",
        consistency: "head",
        id: "name-1",
        mode: "declared",
        name: "taytems.eth",
        namespace: "ens",
        page_size: "10",
        records: "addr:60",
        resolver_address: "0x4976fb03c32e5b8cfe2b6ccb31c09ba78ebaba41",
        resource_id: "fb0f5c88-c7a5-5215-a3a4-819975a35c1b",
        view: "compact"
      };

      const routeParameterSamples = {
        "/v1/events": {
          namespace: "ens",
          name: "taytems.eth"
        },
        "/v1/history/addresses/{address}": {
          view: "compact"
        },
        "/v1/names": {
          namespace: "ens",
          name: "taytems.eth"
        },
        "/v1/profiles/names/{name}": {
          mode: "both",
          records: "addr:60,text:avatar,contenthash"
        },
        "/v1/roles": {
          namespace: "ens",
          name: "taytems.eth"
        }
      };

      const requestBodySamples = {
        "/v1/identity:lookup": {
          profile: "feed",
          namespace: "ens",
          inputs: [
            {
              id: "name-1",
              kind: "name",
              name: "taytems.eth"
            }
          ]
        }
      };

      const disabledTryRoutes = {
        "/v1/history/addresses/{address}":
          "Address history is an audit fan-in path and is intentionally not run from the embedded console."
      };

      function text(value) {
        return value === undefined || value === null ? "" : String(value);
      }

      function appendText(parent, value) {
        parent.textContent = text(value);
        return parent;
      }

      function slug(value) {
        return text(value)
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "") || "route";
      }

      function schemaLabel(schema) {
        if (!schema) return "";
        if (schema.$ref) return schema.$ref.split("/").pop();
        if (schema.enum) return schema.enum.join(" | ");
        if (schema.type === "array") return `${schemaLabel(schema.items) || "value"}[]`;
        if (Array.isArray(schema.type)) return schema.type.join(" | ");
        return schema.type || "";
      }

      function resolveRef(schema, seen = new Set()) {
        if (!schema || !schema.$ref) return schema;
        if (seen.has(schema.$ref)) return {};
        seen.add(schema.$ref);
        const name = schema.$ref.replace("#/components/schemas/", "");
        return resolveRef(spec?.components?.schemas?.[name] || {}, seen);
      }

      function sampleForSchema(schema, propertyName = "value") {
        const resolved = resolveRef(schema);
        if (!resolved) return "";
        if (resolved.example !== undefined) return resolved.example;
        if (resolved.default !== undefined) return resolved.default;
        if (resolved.enum?.length) return resolved.enum[0];
        if (sampleValues[propertyName] !== undefined) {
          const kind = Array.isArray(resolved.type) ? resolved.type[0] : resolved.type;
          if (kind === "integer" || kind === "number") return Number(sampleValues[propertyName]);
          return sampleValues[propertyName];
        }
        if (resolved.type === "object" || resolved.properties) {
          const result = {};
          const required = new Set(resolved.required || []);
          Object.entries(resolved.properties || {}).forEach(([key, value]) => {
            const resolvedValue = resolveRef(value);
            if (required.has(key) || resolvedValue.default !== undefined || sampleValues[key] !== undefined) {
              result[key] = sampleForSchema(value, key);
            }
          });
          if (Object.keys(result).length === 0) {
            const [firstKey, firstValue] = Object.entries(resolved.properties || {})[0] || [];
            if (firstKey) result[firstKey] = sampleForSchema(firstValue, firstKey);
          }
          return result;
        }
        if (resolved.type === "array") {
          return [sampleForSchema(resolved.items || {}, propertyName.replace(/s$/, ""))];
        }
        if (resolved.type === "boolean") return false;
        if (resolved.type === "integer" || resolved.type === "number") return resolved.minimum || 1;
        return sampleValues[propertyName] || "";
      }

      function requestBodySchema(operation) {
        return operation.requestBody?.content?.["application/json"]?.schema || null;
      }

      function cloneJson(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function sampleForRequestBody(entry, schema) {
        if (requestBodySamples[entry.path]) return cloneJson(requestBodySamples[entry.path]);
        return sampleForSchema(schema);
      }

      function parameterSample(entry, parameter) {
        return routeParameterSamples[entry.path]?.[parameter.name] ?? sampleValues[parameter.name];
      }

      function initialParameterValue(entry, parameter) {
        const schema = resolveRef(parameter.schema || {});
        const sample = parameterSample(entry, parameter);
        if (parameter.example !== undefined) return parameter.example;
        if (sample !== undefined && routeParameterSamples[entry.path]?.[parameter.name] !== undefined) {
          return sample;
        }
        if (parameter.schema?.default !== undefined) return parameter.schema.default;
        if (parameter.in === "path" || parameter.required) {
          if (sample !== undefined) return sample;
          if (schema.enum?.length) return schema.enum[0];
        }
        if (parameter.name === "page_size" && sample !== undefined) return sample;
        return "";
      }

      function operationEntries(paths) {
        return Object.entries(paths || {})
          .flatMap(([path, item]) => Object.entries(item || {})
            .filter(([method]) => methodOrder[method] !== undefined)
            .map(([method, operation]) => ({ path, method, operation })))
          .sort((left, right) => {
            const categoryOrder = categoryIndex(left.path) - categoryIndex(right.path);
            if (categoryOrder !== 0) return categoryOrder;
            const pathOrder = left.path.localeCompare(right.path);
            if (pathOrder !== 0) return pathOrder;
            return methodOrder[left.method] - methodOrder[right.method];
          });
      }

      function categoryForPath(path) {
        return categoryDefinitions.find((category) =>
          category.matches.some((pattern) => pattern.test(path))
        ) || {
          id: "other",
          title: "Other",
          description: "Routes that are published by OpenAPI but not assigned to a docs section.",
          matches: []
        };
      }

      function categoryIndex(path) {
        const category = categoryForPath(path);
        const index = categoryDefinitions.findIndex((candidate) => candidate.id === category.id);
        return index === -1 ? categoryDefinitions.length : index;
      }

      function matchesFilter(entry, term) {
        if (!term) return true;
        const operation = entry.operation || {};
        const category = categoryForPath(entry.path);
        const parameterNames = (operation.parameters || []).map((parameter) => parameter.name);
        const haystack = [
          entry.method,
          entry.path,
          operation.summary,
          operation.description,
          operation.operationId,
          category.title,
          category.description,
          ...(operation.tags || []),
          ...parameterNames
        ].join(" ").toLowerCase();
        return haystack.includes(term);
      }

      function groupEntries(entries) {
        const grouped = new Map();
        entries.forEach((entry) => {
          const category = categoryForPath(entry.path);
          if (!grouped.has(category.id)) grouped.set(category.id, { category, entries: [] });
          grouped.get(category.id).entries.push(entry);
        });
        return [...grouped.values()].sort((left, right) => {
          return categoryIndex(left.entries[0].path) - categoryIndex(right.entries[0].path);
        });
      }

      function renderOverview(allEntries) {
        const overview = document.createElement("div");
        overview.className = "overview";
        const values = [
          ["routes", allEntries.length],
          ["sections", groupEntries(allEntries).length],
          ["native route", "/v1/identity:lookup"],
          ["schema", spec.openapi || "OpenAPI"]
        ];
        values.forEach(([label, value]) => {
          const item = document.createElement("div");
          item.className = "overview-item";
          item.appendChild(appendText(document.createElement("span"), label));
          item.lastChild.className = "overview-label";
          item.appendChild(appendText(document.createElement("span"), value));
          item.lastChild.className = "overview-value";
          overview.appendChild(item);
        });
        return overview;
      }

      function renderSidebar(groups) {
        sidebarList.replaceChildren();
        groups.forEach(({ category, entries }) => {
          const link = document.createElement("a");
          link.className = "sidebar-link";
          link.href = `#${category.id}`;
          link.appendChild(appendText(document.createElement("strong"), category.title));
          link.appendChild(appendText(document.createElement("span"), entries.length));
          link.lastChild.className = "route-count";
          sidebarList.appendChild(link);
        });
        sidebarMeta.textContent = `${groups.reduce((sum, group) => sum + group.entries.length, 0)} visible routes`;
      }

      function renderTable(parameters) {
        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");
        ["Name", "In", "Required", "Type", "Description"].forEach((label) => {
          headRow.appendChild(appendText(document.createElement("th"), label));
        });
        thead.appendChild(headRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        parameters.forEach((parameter) => {
          const row = document.createElement("tr");
          [
            parameter.name,
            parameter.in,
            parameter.required ? "yes" : "no",
            schemaLabel(parameter.schema),
            parameter.description
          ].forEach((value, index) => {
            const cell = document.createElement("td");
            const node = index === 0 || index === 3 ? document.createElement("code") : cell;
            appendText(node, value);
            if (node !== cell) cell.appendChild(node);
            row.appendChild(cell);
          });
          tbody.appendChild(row);
        });
        table.appendChild(tbody);
        return table;
      }

      function renderResponses(responses) {
        const list = document.createElement("ul");
        list.className = "response-list";
        Object.entries(responses || {}).forEach(([status, response]) => {
          const item = document.createElement("li");
          const code = document.createElement("span");
          code.className = "status-code";
          appendText(code, status);
          item.appendChild(code);
          item.appendChild(appendText(document.createElement("span"), response.description || ""));
          list.appendChild(item);
        });
        return list;
      }

      function renderField(parameter, state) {
        const schema = parameter.schema || {};
        const resolved = resolveRef(schema);
        const field = document.createElement("label");
        field.className = "field";
        const label = document.createElement("div");
        label.className = "field-label";
        label.appendChild(appendText(document.createElement("strong"), parameter.name));
        label.appendChild(appendText(document.createElement("span"), `${parameter.in}${parameter.required ? " required" : ""}`));
        field.appendChild(label);

        let input;
        if (resolved.enum?.length) {
          input = document.createElement("select");
          input.className = "field-select";
          if (!parameter.required) {
            const empty = document.createElement("option");
            empty.value = "";
            empty.textContent = "";
            input.appendChild(empty);
          }
          resolved.enum.forEach((value) => {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = value;
            input.appendChild(option);
          });
        } else {
          input = document.createElement("input");
          input.className = "field-input";
          input.type = resolved.type === "integer" || resolved.type === "number" ? "number" : "text";
          if (resolved.minimum !== undefined) input.min = String(resolved.minimum);
          if (resolved.maximum !== undefined) input.max = String(resolved.maximum);
        }

        input.value = initialParameterValue(state.entry, parameter);
        input.dataset.name = parameter.name;
        input.dataset.location = parameter.in;
        input.dataset.required = parameter.required ? "true" : "false";
        input.addEventListener("input", () => updatePreview(state));
        input.addEventListener("change", () => updatePreview(state));
        state.inputs.push(input);
        field.appendChild(input);

        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = schemaLabel(schema);
        field.appendChild(hint);
        return field;
      }

      function schemaRows(schema, path = "body", required = true, rows = []) {
        const resolved = resolveRef(schema);
        if (!resolved) return rows;
        const notes = [];
        if (resolved.default !== undefined) notes.push(`default ${JSON.stringify(resolved.default)}`);
        if (resolved.enum?.length) notes.push(`one of ${resolved.enum.join(", ")}`);
        if (resolved.minimum !== undefined) notes.push(`min ${resolved.minimum}`);
        if (resolved.maximum !== undefined) notes.push(`max ${resolved.maximum}`);
        if (resolved.maxItems !== undefined) notes.push(`max ${resolved.maxItems} items`);
        rows.push({
          path,
          type: schemaLabel(schema) || schemaLabel(resolved),
          required: required ? "yes" : "no",
          notes: notes.join("; ")
        });

        if (resolved.type === "object" || resolved.properties) {
          const requiredFields = new Set(resolved.required || []);
          Object.entries(resolved.properties || {}).forEach(([key, value]) => {
            schemaRows(value, `${path}.${key}`, requiredFields.has(key), rows);
          });
        } else if (resolved.type === "array") {
          schemaRows(resolved.items || {}, `${path}[0]`, true, rows);
        }
        return rows;
      }

      function renderRequestBodySchema(schema) {
        const details = document.createElement("details");
        details.open = true;
        details.className = "schema-panel";
        details.appendChild(appendText(document.createElement("summary"), "Request body schema"));
        const table = document.createElement("table");
        table.className = "schema-table";
        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");
        ["Field", "Type", "Required", "Notes"].forEach((label) => {
          headRow.appendChild(appendText(document.createElement("th"), label));
        });
        thead.appendChild(headRow);
        table.appendChild(thead);
        const tbody = document.createElement("tbody");
        schemaRows(schema).forEach((row) => {
          const tr = document.createElement("tr");
          [row.path, row.type, row.required, row.notes].forEach((value, index) => {
            const cell = document.createElement("td");
            const node = index < 2 ? document.createElement("code") : cell;
            appendText(node, value);
            if (node !== cell) cell.appendChild(node);
            tr.appendChild(cell);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        details.appendChild(table);
        return details;
      }

      function getBodyValue(root, path) {
        return path.reduce((value, segment) => value?.[segment], root);
      }

      function setBodyValue(root, path, value) {
        let target = root;
        for (let index = 0; index < path.length - 1; index += 1) {
          const segment = path[index];
          const nextSegment = path[index + 1];
          if (target[segment] === undefined) {
            target[segment] = typeof nextSegment === "number" ? [] : {};
          }
          target = target[segment];
        }
        const last = path[path.length - 1];
        if (value === undefined) {
          if (Array.isArray(target)) target.splice(last, 1);
          else delete target[last];
        } else {
          target[last] = value;
        }
      }

      function bodyInputValue(input, schema, required) {
        const resolved = resolveRef(schema);
        if (resolved.type === "boolean") return input.checked;
        const raw = input.value.trim();
        if (!raw && !required) return undefined;
        if (resolved.type === "integer") return Number.parseInt(raw || "0", 10);
        if (resolved.type === "number") return Number(raw || "0");
        return raw;
      }

      function updateBodyPreview(state) {
        if (!state.bodyPreview) return;
        state.bodyPreview.textContent = JSON.stringify(state.bodyValue, null, 2);
      }

      function renderBodyPrimitive(schema, state, path, label, required) {
        const resolved = resolveRef(schema);
        const field = document.createElement("label");
        field.className = "field";
        const labelNode = document.createElement("div");
        labelNode.className = "field-label";
        labelNode.appendChild(appendText(document.createElement("strong"), label));
        labelNode.appendChild(appendText(document.createElement("span"), required ? "required" : "optional"));
        field.appendChild(labelNode);

        let input;
        if (resolved.enum?.length) {
          input = document.createElement("select");
          input.className = "field-select";
          if (!required) {
            const empty = document.createElement("option");
            empty.value = "";
            empty.textContent = "";
            input.appendChild(empty);
          }
          resolved.enum.forEach((value) => {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = value;
            input.appendChild(option);
          });
        } else {
          input = document.createElement("input");
          input.className = "field-input";
          input.type = resolved.type === "integer" || resolved.type === "number" ? "number" : "text";
          if (resolved.type === "boolean") input.type = "checkbox";
          if (resolved.minimum !== undefined) input.min = String(resolved.minimum);
          if (resolved.maximum !== undefined) input.max = String(resolved.maximum);
        }

        const value = getBodyValue(state.bodyValue, path);
        if (input.type === "checkbox") input.checked = Boolean(value);
        else input.value = value ?? "";
        input.addEventListener("input", () => {
          setBodyValue(state.bodyValue, path, bodyInputValue(input, schema, required));
          updateBodyPreview(state);
        });
        input.addEventListener("change", () => {
          setBodyValue(state.bodyValue, path, bodyInputValue(input, schema, required));
          updateBodyPreview(state);
        });
        field.appendChild(input);

        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = schemaLabel(schema) || schemaLabel(resolved);
        field.appendChild(hint);
        return field;
      }

      function renderBodyControls(schema, state, path = [], label = "body", required = true) {
        const resolved = resolveRef(schema);
        if (resolved.type === "object" || resolved.properties) {
          const group = document.createElement("fieldset");
          group.className = "body-group";
          group.appendChild(appendText(document.createElement("legend"), label));
          const controls = document.createElement("div");
          controls.className = "body-controls";
          const requiredFields = new Set(resolved.required || []);
          Object.entries(resolved.properties || {}).forEach(([key, value]) => {
            controls.appendChild(renderBodyControls(value, state, path.concat(key), key, requiredFields.has(key)));
          });
          group.appendChild(controls);
          return group;
        }

        if (resolved.type === "array") {
          const group = document.createElement("fieldset");
          group.className = "body-group";
          group.appendChild(appendText(document.createElement("legend"), `${label}[0]`));
          group.appendChild(renderBodyControls(resolved.items || {}, state, path.concat(0), `${label}[0]`, required));
          return group;
        }

        return renderBodyPrimitive(schema, state, path, label, required);
      }

      function renderRequestBodyBuilder(entry, schema, state) {
        state.bodyValue = sampleForRequestBody(entry, schema);
        const panel = document.createElement("div");
        panel.className = "body-panel";
        const title = document.createElement("div");
        title.className = "body-panel-title";
        title.appendChild(appendText(document.createElement("h3"), "Body builder"));
        title.appendChild(appendText(document.createElement("span"), "application/json"));
        title.lastChild.className = "hint";
        panel.appendChild(title);
        panel.appendChild(renderBodyControls(schema, state));
        const previewLabel = document.createElement("div");
        previewLabel.className = "field-label";
        previewLabel.appendChild(appendText(document.createElement("strong"), "JSON preview"));
        panel.appendChild(previewLabel);
        state.bodyPreview = document.createElement("pre");
        state.bodyPreview.className = "body-preview";
        panel.appendChild(state.bodyPreview);
        updateBodyPreview(state);
        return panel;
      }

      function buildUrl(entry, inputs) {
        let path = entry.path;
        const query = new URLSearchParams();
        inputs.forEach((input) => {
          const value = input.value.trim();
          if (!value) return;
          if (input.dataset.location === "path") {
            path = path.replace(`{${input.dataset.name}}`, encodeURIComponent(value));
          } else if (input.dataset.location === "query") {
            query.set(input.dataset.name, value);
          }
        });
        const queryText = query.toString();
        return queryText ? `${path}?${queryText}` : path;
      }

      function missingRequired(inputs) {
        return inputs
          .filter((input) => input.dataset.required === "true" && !input.value.trim())
          .map((input) => input.dataset.name);
      }

      function updatePreview(state) {
        state.preview.textContent = `${state.entry.method.toUpperCase()} ${buildUrl(state.entry, state.inputs)}`;
      }

      function setMetric(container, label, value, kind = "") {
        const metric = document.createElement("div");
        metric.className = "metric";
        const valueNode = appendText(document.createElement("span"), value);
        valueNode.className = `metric-value ${kind}`.trim();
        metric.appendChild(valueNode);
        const labelNode = appendText(document.createElement("span"), label);
        labelNode.className = "metric-label";
        metric.appendChild(labelNode);
        container.appendChild(metric);
      }

      function formatHeaders(headers) {
        const result = {};
        headers.forEach((value, key) => {
          result[key] = value;
        });
        return JSON.stringify(result, null, 2);
      }

      async function sendRequest(state) {
        const missing = missingRequired(state.inputs);
        if (missing.length > 0) {
          showError(state, `Missing required parameter: ${missing.join(", ")}`);
          return;
        }

        let body;
        const headers = { accept: "application/json" };
        if (state.bodyValue !== undefined) {
          body = JSON.stringify(state.bodyValue);
          headers["content-type"] = "application/json";
        } else if (state.bodyInput) {
          const rawBody = state.bodyInput.value.trim();
          if (rawBody) {
            try {
              body = JSON.stringify(JSON.parse(rawBody));
              headers["content-type"] = "application/json";
            } catch (error) {
              showError(state, error.message || "Request body is not valid JSON.");
              return;
            }
          }
        }

        const url = buildUrl(state.entry, state.inputs);
        state.button.disabled = true;
        state.button.textContent = "Sending";
        state.result.replaceChildren();
        state.result.appendChild(appendText(document.createElement("div"), "Sending request..."));
        state.result.lastChild.className = "empty";

        const started = performance.now();
        try {
          const response = await fetch(url, {
            method: state.entry.method.toUpperCase(),
            headers,
            body
          });
          const elapsed = performance.now() - started;
          const responseText = await response.text();
          renderResult(state, response, responseText, elapsed);
        } catch (error) {
          showError(state, error.message || "Request failed.");
        } finally {
          state.button.disabled = false;
          state.button.textContent = "Send";
        }
      }

      function showError(state, message) {
        state.result.replaceChildren();
        const failure = appendText(document.createElement("div"), message);
        failure.className = "error";
        state.result.appendChild(failure);
      }

      function renderResult(state, response, responseText, elapsed) {
        state.result.replaceChildren();
        const shell = document.createElement("div");
        shell.className = "response-shell";

        const metrics = document.createElement("div");
        metrics.className = "metrics";
        setMetric(metrics, "status", response.status, response.ok ? "ok" : "error");
        setMetric(metrics, "time", `${elapsed.toFixed(1)} ms`);
        setMetric(metrics, "bytes", new Blob([responseText]).size);
        setMetric(metrics, "type", response.headers.get("content-type") || "unknown");
        shell.appendChild(metrics);

        const headers = document.createElement("details");
        headers.appendChild(appendText(document.createElement("summary"), "Response headers"));
        const headersText = document.createElement("pre");
        headersText.textContent = formatHeaders(response.headers);
        headers.appendChild(headersText);
        shell.appendChild(headers);

        const body = document.createElement("pre");
        try {
          body.textContent = JSON.stringify(JSON.parse(responseText), null, 2);
        } catch (_) {
          body.textContent = responseText || "(empty body)";
        }
        shell.appendChild(body);
        state.result.appendChild(shell);
      }

      function renderTryConsole(entry) {
        const operation = entry.operation || {};
        const disabledReason = disabledTryRoutes[entry.path];
        const state = {
          entry,
          inputs: [],
          bodyInput: null,
          bodyPreview: null,
          bodyValue: undefined,
          button: null,
          preview: document.createElement("div"),
          result: document.createElement("div")
        };

        const details = document.createElement("details");
        details.open = entry.path === "/v1/identity:lookup" || operation.parameters?.length > 0 || requestBodySchema(operation);
        details.appendChild(appendText(document.createElement("summary"), "Try request"));

        if (disabledReason) {
          const disabled = appendText(document.createElement("div"), disabledReason);
          disabled.className = "empty";
          details.appendChild(disabled);
          return details;
        }

        const grid = document.createElement("div");
        grid.className = "try-grid";

        const parameters = operation.parameters || [];
        if (parameters.length > 0) {
          const fields = document.createElement("div");
          fields.className = "field-grid";
          parameters.forEach((parameter) => fields.appendChild(renderField(parameter, state)));
          grid.appendChild(fields);
        }

        const bodySchema = requestBodySchema(operation);
        if (bodySchema) {
          grid.appendChild(renderRequestBodySchema(bodySchema));
          grid.appendChild(renderRequestBodyBuilder(entry, bodySchema, state));
        }

        state.preview.className = "url-preview";
        grid.appendChild(state.preview);

        const actions = document.createElement("div");
        actions.className = "request-actions";
        state.button = appendText(document.createElement("button"), "Send");
        state.button.type = "button";
        state.button.className = "send-button";
        state.button.addEventListener("click", () => sendRequest(state));
        actions.appendChild(state.button);
        const clear = appendText(document.createElement("button"), "Clear response");
        clear.type = "button";
        clear.className = "clear-button";
        clear.addEventListener("click", () => state.result.replaceChildren());
        actions.appendChild(clear);
        grid.appendChild(actions);

        state.result.className = "response-shell";
        grid.appendChild(state.result);
        details.appendChild(grid);
        updatePreview(state);
        return details;
      }

      function renderOperation(entry) {
        const operation = entry.operation || {};
        const section = document.createElement("section");
        section.className = "operation";
        section.id = `${entry.method}-${slug(entry.path)}`;

        const header = document.createElement("div");
        header.className = "operation-header";
        const method = appendText(document.createElement("span"), entry.method);
        method.className = `method ${entry.method}`;
        header.appendChild(method);

        const identity = document.createElement("div");
        identity.appendChild(appendText(document.createElement("div"), entry.path));
        identity.lastChild.className = "path";
        if (operation.summary) {
          identity.appendChild(appendText(document.createElement("div"), operation.summary));
          identity.lastChild.className = "summary";
        }
        if (operation.tags && operation.tags.length > 0) {
          const tags = document.createElement("div");
          tags.className = "tags";
          operation.tags.forEach((tag) => {
            const chip = appendText(document.createElement("span"), tag);
            chip.className = "tag";
            tags.appendChild(chip);
          });
          identity.appendChild(tags);
        }
        header.appendChild(identity);
        section.appendChild(header);

        section.appendChild(renderTryConsole(entry));

        const parameters = operation.parameters || [];
        if (parameters.length > 0) {
          const details = document.createElement("details");
          details.appendChild(appendText(document.createElement("summary"), "Parameters"));
          details.appendChild(renderTable(parameters));
          section.appendChild(details);
        }

        const responses = operation.responses || {};
        if (Object.keys(responses).length > 0) {
          const details = document.createElement("details");
          details.appendChild(appendText(document.createElement("summary"), "Responses"));
          details.appendChild(renderResponses(responses));
          section.appendChild(details);
        }

        return section;
      }

      function renderGroup(group) {
        const block = document.createElement("section");
        block.className = "section-block";
        block.id = group.category.id;

        const heading = document.createElement("div");
        heading.className = "section-heading";
        const copy = document.createElement("div");
        copy.appendChild(appendText(document.createElement("h2"), group.category.title));
        copy.appendChild(appendText(document.createElement("div"), group.category.description));
        copy.lastChild.className = "section-description";
        heading.appendChild(copy);
        heading.appendChild(appendText(document.createElement("span"), `${group.entries.length} routes`));
        heading.lastChild.className = "route-count";
        block.appendChild(heading);

        const routes = document.createElement("div");
        routes.className = "section-routes";
        group.entries.forEach((entry) => routes.appendChild(renderOperation(entry)));
        block.appendChild(routes);
        return block;
      }

      function render() {
        const term = filter.value.trim().toLowerCase();
        const allEntries = operationEntries(spec.paths);
        const entries = allEntries.filter((entry) => matchesFilter(entry, term));
        const groups = groupEntries(entries);
        content.replaceChildren();
        renderSidebar(groups);
        if (entries.length === 0) {
          content.appendChild(appendText(document.createElement("div"), "No routes match the current filter."));
          content.lastChild.className = "empty";
          return;
        }
        content.appendChild(renderOverview(allEntries));
        groups.forEach((group) => content.appendChild(renderGroup(group)));
      }

      async function load() {
        try {
          const response = await fetch(specUrl, { headers: { accept: "application/json" } });
          if (!response.ok) throw new Error(`OpenAPI request failed with ${response.status}`);
          spec = await response.json();
          title.textContent = spec.info?.title || "OpenAPI docs";
          const entries = operationEntries(spec.paths);
          meta.textContent = `${spec.openapi || "OpenAPI"} | ${spec.info?.version || "unversioned"} | ${entries.length} routes`;
          render();
        } catch (error) {
          content.replaceChildren();
          sidebarList.replaceChildren();
          sidebarMeta.textContent = "Unavailable";
          const failure = appendText(document.createElement("div"), error.message || "Unable to load OpenAPI document.");
          failure.className = "error";
          content.appendChild(failure);
          meta.textContent = "OpenAPI document unavailable";
        }
      }

      filter.addEventListener("input", () => {
        if (spec) render();
      });

      load();
    </script>
  </body>
</html>
