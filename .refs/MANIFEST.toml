authoritative_for = [
  "EntryPoint event and handleOps calldata shapes consumed by ens_gas_sponsorship_l1",
  "UserOperationEvent/BeforeExecution fragments in manifests/*/ethereum/ens/ens_gas_sponsorship_l1",
  "PackedUserOperation decode rules for the entrypoint_user_operation adapter",
]

[refs.chainlink]
repo = "https://github.com/smartcontractkit/chainlink"
commit = "05ead33c6a0d71eab13576a8c3b56f9d99748c52"
purpose = "Chainlink core repository at the v2.19.0 release tag. Authoritative only for aggregator interface event shapes; feed deployment addresses are operational metadata verified on-chain."
authoritative_for = [
