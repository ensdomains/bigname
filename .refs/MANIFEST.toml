  "price-feed event semantics referenced by gas_sponsorship projection docs",
]

[refs.erc7579]
repo = "https://github.com/erc7579/erc7579-implementation"
commit = "99cbd34479b9d125651316ff2d92f38611ddf665"
purpose = "ERC-7579 modular smart account reference implementation: the execute(mode, executionCalldata) account interface and execution-mode/calldata encoding unwrapped by sponsored-operation attribution."
authoritative_for = [
  "IERC7579Account.execute shape and ModeLib/ExecutionLib encoding decoded by the entrypoint_user_operation adapter",
]
