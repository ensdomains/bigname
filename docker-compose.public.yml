name: bigname

services:
  public-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${BIGNAME_PUBLIC_HTTP_PORT:-80}:80"
      - "${BIGNAME_PUBLIC_HTTPS_PORT:-443}:443"
      - "${BIGNAME_PUBLIC_HTTPS_PORT:-443}:443/udp"
    environment:
      BIGNAME_PUBLIC_SITE_ADDRESS: ${BIGNAME_PUBLIC_SITE_ADDRESS:-:80}
      BIGNAME_PUBLIC_UPSTREAM: ${BIGNAME_PUBLIC_UPSTREAM:-api:3000}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
