# ENSv2 post-audit RootRegistry admission for the current Sepolia deployment.
# RootRegistry deployment address:
# (upstream: .refs/ens_v2/contracts/deployments/sepolia/RootRegistry.json:L2 @ ens_v2@48b3e2d).
manifest_version = 2
namespace = "ens"
source_family = "ens_v2_root_l1"
chain = "ethereum-sepolia"
deployment_epoch = "ens_v2_sepolia_post_audit"
rollout_status = "active"
normalizer_version = "ensip15@ens-normalize-0.1.1"

[capability_flags]

[[roots]]
name = "RootRegistry"
address = "0x11b5bfbe9078d826b1edbdd1cfc12f5828d9f50c"
# Start block follows the current Sepolia deployment transaction.
# (upstream: .refs/ens_v2/contracts/deployments/sepolia/RootRegistry.json:L2792 @ ens_v2@48b3e2d).
start_block = 11163319

[[contracts]]
role = "root_registry"
address = "0x11b5bfbe9078d826b1edbdd1cfc12f5828d9f50c"
proxy_kind = "none"
# Start block follows the current Sepolia deployment transaction.
# (upstream: .refs/ens_v2/contracts/deployments/sepolia/RootRegistry.json:L2792 @ ens_v2@48b3e2d).
start_block = 11163319

[[discovery_rules]]
edge_kind = "subregistry"
from_role = "root_registry"
admission = "reachable_from_root"

# RootRegistry follows the registry event ABI consumed by ENSv2 registry adapters.
# RegistryCreated and URIUpdated are intentionally outside normalized-event admission.
# LabelRegistered: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IRegistryEvents.sol:L18 @ ens_v2@48b3e2d).
[[abi.events]]
name = "LabelRegistered"
fragment = "event LabelRegistered(uint256 indexed tokenId, bytes32 indexed labelHash, string label, address owner, uint64 expiry, address indexed sender)"
emitter_roles = ["root_registry"]
normalized_events = ["RegistrationGranted"]

# LabelReserved: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IRegistryEvents.sol:L33 @ ens_v2@48b3e2d).
[[abi.events]]
name = "LabelReserved"
fragment = "event LabelReserved(uint256 indexed tokenId, bytes32 indexed labelHash, string label, uint64 expiry, address indexed sender)"
emitter_roles = ["root_registry"]
normalized_events = ["RegistrationReserved"]

# LabelUnregistered: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IRegistryEvents.sol:L44 @ ens_v2@48b3e2d).
[[abi.events]]
name = "LabelUnregistered"
fragment = "event LabelUnregistered(uint256 indexed tokenId, address indexed sender)"
emitter_roles = ["root_registry"]
normalized_events = ["RegistrationReleased"]

# ExpiryUpdated: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IRegistryEvents.sol:L50 @ ens_v2@48b3e2d).
[[abi.events]]
name = "ExpiryUpdated"
fragment = "event ExpiryUpdated(uint256 indexed tokenId, uint64 indexed newExpiry, address indexed sender)"
emitter_roles = ["root_registry"]
normalized_events = ["ExpiryChanged"]

# SubregistryUpdated: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IRegistryEvents.sol:L56 @ ens_v2@48b3e2d).
[[abi.events]]
name = "SubregistryUpdated"
fragment = "event SubregistryUpdated(uint256 indexed tokenId, address indexed subregistry, address indexed sender)"
emitter_roles = ["root_registry"]
normalized_events = ["SubregistryChanged"]

# ResolverUpdated: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IRegistryEvents.sol:L66 @ ens_v2@48b3e2d).
[[abi.events]]
name = "ResolverUpdated"
fragment = "event ResolverUpdated(uint256 indexed tokenId, address indexed resolver, address indexed sender)"
emitter_roles = ["root_registry"]
normalized_events = ["ResolverChanged"]

# TokenResource: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IPermissionedRegistry.sol:L38 @ ens_v2@48b3e2d).
[[abi.events]]
name = "TokenResource"
fragment = "event TokenResource(uint256 indexed tokenId, uint256 indexed resource)"
emitter_roles = ["root_registry"]
normalized_events = ["TokenResourceLinked"]

# RootRegistry inherits the ERC-1155 transfer events present in its deployed ABI.
# TransferSingle: (upstream: .refs/ens_v2/contracts/deployments/sepolia/RootRegistry.json:L689 @ ens_v2@48b3e2d).
[[abi.events]]
name = "TransferSingle"
fragment = "event TransferSingle(address indexed operator, address indexed from, address indexed to, uint256 id, uint256 value)"
emitter_roles = ["root_registry"]
normalized_events = ["TokenControlTransferred"]

# TransferBatch: (upstream: .refs/ens_v2/contracts/deployments/sepolia/RootRegistry.json:L652 @ ens_v2@48b3e2d).
[[abi.events]]
name = "TransferBatch"
fragment = "event TransferBatch(address indexed operator, address indexed from, address indexed to, uint256[] ids, uint256[] values)"
emitter_roles = ["root_registry"]
normalized_events = ["TokenControlTransferred"]

# EACRolesChanged comes from the permissioned registry's inherited EnhancedAccessControl interface:
# (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IPermissionedRegistry.sol:L10 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/access-control/interfaces/IEnhancedAccessControl.sol:L22 @ ens_v2@48b3e2d).
[[abi.events]]
name = "EACRolesChanged"
fragment = "event EACRolesChanged(uint256 indexed resource, address indexed account, uint256 oldRoleBitmap, uint256 newRoleBitmap)"
emitter_roles = ["root_registry"]
normalized_events = ["PermissionChanged", "RootPermissionChanged"]

# TokenRegenerated: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IRegistryEvents.sol:L82 @ ens_v2@48b3e2d).
[[abi.events]]
name = "TokenRegenerated"
fragment = "event TokenRegenerated(uint256 indexed oldTokenId, uint256 indexed newTokenId)"
emitter_roles = ["root_registry"]
normalized_events = ["TokenRegenerated"]

# ParentUpdated: (upstream: .refs/ens_v2/contracts/src/registry/interfaces/IRegistryEvents.sol:L88 @ ens_v2@48b3e2d).
[[abi.events]]
name = "ParentUpdated"
fragment = "event ParentUpdated(address indexed parent, string label, address indexed sender)"
emitter_roles = ["root_registry"]
normalized_events = ["ParentChanged"]
