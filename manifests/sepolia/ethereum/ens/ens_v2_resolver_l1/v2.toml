# ENSv2 post-audit resolver source-family admission for the current Sepolia
# deployment. PermissionedResolverImpl is implementation metadata for discovered
# or explicitly admitted resolver instances, not an initial watched root or
# contract address:
# (upstream: .refs/ens_v2/contracts/deployments/sepolia/PermissionedResolverImpl.json:L2 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PermissionedResolver.sol:L33 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PermissionedResolver.sol:L87 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PermissionedResolver.sol:L126 @ ens_v2@48b3e2d).
manifest_version = 2
namespace = "ens"
source_family = "ens_v2_resolver_l1"
chain = "ethereum-sepolia"
deployment_epoch = "ens_v2_sepolia_post_audit"
rollout_status = "active"
normalizer_version = "ensip15@ens-normalize-0.1.1"
roots = []
contracts = []
discovery_rules = []

[capability_flags]

# Resolver event ABI fragments consumed by ENSv2 resolver and permissions adapters.
# DataChanged and NamedDataResource are intentionally outside record and permission
# normalization. PublicResolverV2 can be discovery-watched for configured generic record events but is not an admitted resolver profile; projection publishes no record values, retains only a current-emitter pending version boundary, and excludes non-current emitters.
# Locked migration can select PublicResolverV2 before the registry emits ResolverUpdated:
# (upstream: .refs/ens_v2/contracts/src/resolver/PublicResolverV2.sol:L4 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PublicResolverV2.sol:L23 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PublicResolverV2.sol:L179 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/deployments/sepolia/PublicResolverV2.json:L429 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/deployments/sepolia/PublicResolverV2.json:L598 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/migration/LockedWrapperReceiver.sol:L139 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/registry/PermissionedRegistry.sol:L474 @ ens_v2@48b3e2d).
# PermissionedResolver imports ENS resolver profile interfaces:
# (upstream: .refs/ens_v2/contracts/src/resolver/PermissionedResolver.sol:L4 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PermissionedResolver.sol:L6 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PermissionedResolver.sol:L8 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PermissionedResolver.sol:L9 @ ens_v2@48b3e2d)
# (upstream: .refs/ens_v2/contracts/src/resolver/PermissionedResolver.sol:L13 @ ens_v2@48b3e2d).
# AddressChanged: (upstream: .refs/ens_v1/contracts/resolvers/profiles/IAddressResolver.sol:L6 @ ens_v1@91c966f).
[[abi.events]]
name = "AddressChanged"
fragment = "event AddressChanged(bytes32 indexed node, uint256 coinType, bytes newAddress)"
normalized_events = ["RecordChanged"]

