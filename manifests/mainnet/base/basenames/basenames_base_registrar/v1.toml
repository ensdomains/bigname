# Bootstrap seed for the canonical Basenames registrar on Base mainnet.
# Address confirmed from the upstream base/basenames deployment metadata:
# (upstream: .refs/basenames/README.md:L29 @ basenames@1809bbc).
manifest_version = 1
namespace = "basenames"
source_family = "basenames_base_registrar"
chain = "base-mainnet"
deployment_epoch = "basenames_v1"
rollout_status = "active"
normalizer_version = "ensip15@ens-normalize-0.1.1"
roots = []
discovery_rules = []

[capability_flags]

[[contracts]]
role = "registrar"
address = "0x03c4738ee98ae44591e1a4a4f3cab6641d95dd9a"
proxy_kind = "none"

# Legacy RegistrarController Base mainnet deployment:
# (upstream: .refs/basenames/README.md:L30 @ basenames@1809bbc).
[[contracts]]
role = "legacy_registrar_controller"
address = "0x4cCb0BB02FCABA27e82a56646E81d8c5bC4119a5"
proxy_kind = "none"

# UpgradeableRegistrarController Base mainnet proxy and implementation:
# (upstream: .refs/basenames/README.md:L36 @ basenames@1809bbc)
# (upstream: .refs/basenames/README.md:L37 @ basenames@1809bbc).
[[contracts]]
role = "upgradeable_registrar_controller"
address = "0xa7d2607c6BD39Ae9521e514026CBB078405Ab322"
proxy_kind = "erc1967"
implementation = "0x9ad14968093C5E8C2A8CC86f6868CFEE8C659717"

# Basenames label-bearing registrar-controller events consumed by
# manifest-derived authority topic lookup:
# (upstream: .refs/basenames/README.md:L30 @ basenames@1809bbc)
# (upstream: .refs/basenames/README.md:L36 @ basenames@1809bbc)
# (upstream: .refs/basenames/README.md:L37 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/RegistrarController.sol:L180 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/RegistrarController.sol:L187 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/UpgradeableRegistrarController.sol:L191 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/UpgradeableRegistrarController.sol:L198 @ basenames@1809bbc).
[[abi.events]]
name = "NameRegistered"
fragment = "event NameRegistered(string name, bytes32 indexed label, address indexed owner, uint256 expires)"
emitter_roles = ["legacy_registrar_controller", "upgradeable_registrar_controller"]
normalized_events = ["RegistrationGranted"]

[[abi.events]]
name = "NameRenewed"
fragment = "event NameRenewed(string name, bytes32 indexed label, uint256 expires)"
emitter_roles = ["legacy_registrar_controller", "upgradeable_registrar_controller"]
normalized_events = ["RegistrationRenewed"]

# BaseRegistrar is an ERC721 token contract for registered labels:
# (upstream: .refs/basenames/src/L2/BaseRegistrar.sol:L5 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/BaseRegistrar.sol:L24 @ basenames@1809bbc).
[[abi.events]]
name = "Transfer"
fragment = "event Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
emitter_roles = ["registrar"]
normalized_events = ["TokenControlTransferred"]
