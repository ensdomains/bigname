# Bootstrap seed for the canonical Basenames registry on Base mainnet with
# registry-observed resolver discovery admission.
# Registry deployment and resolver-setting surface:
# (upstream: .refs/basenames/README.md:L28 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/Registry.sol:L113 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/Registry.sol:L132 @ basenames@1809bbc).
manifest_version = 2
namespace = "basenames"
source_family = "basenames_base_registry"
chain = "base-mainnet"
deployment_epoch = "basenames_v1"
rollout_status = "active"
normalizer_version = "ensip15@ens-normalize-0.1.1"

[capability_flags]
declared_children = { status = "supported", notes = "registry-controlled child surfaces are authoritative inputs on Base mainnet" }

[[roots]]
name = "BasenamesRegistry"
address = "0xb94704422c2a1e396835a571837aa5ae53285a95"

[[contracts]]
role = "registry"
address = "0xb94704422c2a1e396835a571837aa5ae53285a95"
proxy_kind = "none"

[[discovery_rules]]
edge_kind = "subregistry"
from_role = "registry"
admission = "reachable_from_root"

[[discovery_rules]]
edge_kind = "resolver"
from_role = "registry"
admission = "reachable_from_root"

# Registry event ABI fragments consumed by manifest-derived authority topic
# lookup. The Basenames registry inherits the ENS event surface and emits the
# registry events in these mutators:
# (upstream: .refs/basenames/src/L2/Registry.sol:L104 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/Registry.sol:L126 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/Registry.sol:L137 @ basenames@1809bbc)
# (upstream: .refs/basenames/src/L2/Registry.sol:L146 @ basenames@1809bbc).
[[abi.events]]
name = "NewOwner"
fragment = "event NewOwner(bytes32 indexed node, bytes32 indexed label, address owner)"
emitter_roles = ["registry"]
normalized_events = ["AuthorityTransferred"]

[[abi.events]]
name = "Transfer"
fragment = "event Transfer(bytes32 indexed node, address owner)"
emitter_roles = ["registry"]
normalized_events = ["AuthorityTransferred"]

[[abi.events]]
name = "NewResolver"
fragment = "event NewResolver(bytes32 indexed node, address resolver)"
emitter_roles = ["registry"]
normalized_events = ["ResolverChanged"]

[[abi.events]]
name = "NewTTL"
fragment = "event NewTTL(bytes32 indexed node, uint64 ttl)"
emitter_roles = ["registry"]
normalized_events = ["AuthorityEpochChanged"]
