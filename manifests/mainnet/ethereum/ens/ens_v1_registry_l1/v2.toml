# Bootstrap seed for the canonical ENS registry on Ethereum mainnet with
# registry-observed resolver discovery admission.
# ENSv1 emits resolver changes from the registry event surface:
# (upstream: .refs/ens_v1/contracts/registry/ENS.sol:L12 @ ens_v1@91c966f)
# (upstream: .refs/ens_v1/contracts/registry/ENSRegistry.sol:L89 @ ens_v1@91c966f)
# (upstream: .refs/ens_v1/contracts/registry/ENSRegistry.sol:L174 @ ens_v1@91c966f).
manifest_version = 2
namespace = "ens"
source_family = "ens_v1_registry_l1"
chain = "ethereum-mainnet"
deployment_epoch = "ens_v1"
rollout_status = "deprecated"
normalizer_version = "ensip15@ens-normalize-0.1.0"

[capability_flags]
declared_children = { status = "supported", notes = "registry-controlled child surfaces are authoritative inputs" }

[[roots]]
name = "ENSRegistry"
address = "0x00000000000C2E074eC69A0dFb2997BA6C7d2E1E"
# Start block is ens_subgraph reference-only metadata.
# (upstream: .refs/ens_subgraph/subgraph.yaml:L15 @ ens_subgraph@723f1b6).
start_block = 9380380

[[contracts]]
role = "registry"
address = "0x00000000000C2E074eC69A0dFb2997BA6C7d2E1E"
proxy_kind = "none"
# Start block is ens_subgraph reference-only metadata.
# (upstream: .refs/ens_subgraph/subgraph.yaml:L15 @ ens_subgraph@723f1b6).
start_block = 9380380

[[discovery_rules]]
edge_kind = "subregistry"
from_role = "registry"
admission = "reachable_from_root"

[[discovery_rules]]
edge_kind = "resolver"
from_role = "registry"
admission = "reachable_from_root"
