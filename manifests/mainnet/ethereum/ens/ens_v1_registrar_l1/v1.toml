# Bootstrap seed for the .eth registrar on Ethereum mainnet.
manifest_version = 1
namespace = "ens"
source_family = "ens_v1_registrar_l1"
chain = "ethereum-mainnet"
deployment_epoch = "ens_v1"
rollout_status = "active"
normalizer_version = "uts46-v1"
discovery_rules = []

[capability_flags]
exact_name_profile = { status = "shadow", notes = "registration lifecycle is indexed before product reads depend on it" }
name_history = { status = "shadow", notes = "historical registration events remain downstream work" }

[[roots]]
name = "ETHRegistrar"
address = "0x57f1887a8BF19b14fC0dF6Fd9B2acc9Af147eA85"
# Start block is ens_subgraph reference-only metadata.
# (upstream: .refs/ens_subgraph/subgraph.yaml:L122 @ ens_subgraph@723f1b6).
start_block = 9380410

[[contracts]]
role = "registrar"
address = "0x57f1887a8BF19b14fC0dF6Fd9B2acc9Af147eA85"
proxy_kind = "none"
# Start block is ens_subgraph reference-only metadata.
# (upstream: .refs/ens_subgraph/subgraph.yaml:L122 @ ens_subgraph@723f1b6).
start_block = 9380410

[[contracts]]
role = "legacy_registrar_controller"
address = "0x283Af0B28c62C092C9727F1Ee09c02CA627EB7F5"
proxy_kind = "none"
# Start block and legacy controller event admission follow the pinned ENS subgraph.
# (upstream: .refs/ens_subgraph/subgraph.yaml:L145 @ ens_subgraph@723f1b6)
# (upstream: .refs/ens_subgraph/subgraph.yaml:L148 @ ens_subgraph@723f1b6)
# (upstream: .refs/ens_subgraph/subgraph.yaml:L150 @ ens_subgraph@723f1b6)
# (upstream: .refs/ens_subgraph/subgraph.yaml:L162 @ ens_subgraph@723f1b6).
start_block = 9380471

[[contracts]]
role = "wrapped_registrar_controller"
address = "0x253553366Da8546fC250F225fe3d25d0C782303b"
proxy_kind = "none"
# Deployment address and start block are pinned in ENSv1 deployment metadata;
# the controller's label-bearing event admission follows the pinned ENS subgraph.
# (upstream: .refs/ens_v1/deployments/mainnet/WrappedETHRegistrarController.json:L2 @ ens_v1@91c966f)
# (upstream: .refs/ens_v1/deployments/mainnet/WrappedETHRegistrarController.json:L640 @ ens_v1@91c966f)
# (upstream: .refs/ens_subgraph/subgraph.yaml:L170 @ ens_subgraph@723f1b6)
# (upstream: .refs/ens_subgraph/subgraph.yaml:L187 @ ens_subgraph@723f1b6).
start_block = 16925618

[[contracts]]
role = "unwrapped_registrar_controller"
address = "0x59E16fcCd424Cc24e280Be16E11Bcd56fb0CE547"
proxy_kind = "none"
# Deployment address and start block are pinned in ENSv1 deployment metadata;
# label-bearing registration and renewal events are emitted by the controller.
# (upstream: .refs/ens_v1/deployments/mainnet/ETHRegistrarController.json:L2 @ ens_v1@91c966f)
# (upstream: .refs/ens_v1/deployments/mainnet/ETHRegistrarController.json:L706 @ ens_v1@91c966f)
# (upstream: .refs/ens_v1/contracts/ethregistrar/ETHRegistrarController.sol:L116 @ ens_v1@91c966f)
# (upstream: .refs/ens_v1/contracts/ethregistrar/ETHRegistrarController.sol:L133 @ ens_v1@91c966f).
start_block = 22764821

# Legacy registrar-controller event ABI fragments consumed by block-derived
# preimage observation. Newer controller variants remain a follow-up because
# they share event names with different canonical signatures.
# NameRegistered legacy-controller admission follows the pinned ENS subgraph:
# (upstream: .refs/ens_subgraph/subgraph.yaml:L162 @ ens_subgraph@723f1b6)
# (upstream: .refs/ens_subgraph/subgraph.yaml:L163 @ ens_subgraph@723f1b6)
# (upstream: .refs/ens_subgraph/subgraph.yaml:L164 @ ens_subgraph@723f1b6).
[[abi.events]]
name = "NameRegistered"
fragment = "event NameRegistered(string name, bytes32 indexed label, address indexed owner, uint256 cost, uint256 expires)"
emitter_roles = ["legacy_registrar_controller"]
normalized_events = ["PreimageObserved"]

# NameRenewed legacy-controller admission follows the pinned ENS subgraph:
# (upstream: .refs/ens_subgraph/subgraph.yaml:L166 @ ens_subgraph@723f1b6).
[[abi.events]]
name = "NameRenewed"
fragment = "event NameRenewed(string name, bytes32 indexed label, uint256 cost, uint256 expires)"
emitter_roles = ["legacy_registrar_controller"]
normalized_events = ["PreimageObserved"]
