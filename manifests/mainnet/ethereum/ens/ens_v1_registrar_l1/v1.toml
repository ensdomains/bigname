# (upstream: .refs/ens_v1/contracts/ethregistrar/ETHRegistrarController.sol:L250 @ ens_v1@91c966f)
# (upstream: .refs/ens_v1/contracts/ethregistrar/ETHRegistrarController.sol:L251 @ ens_v1@91c966f).
[[abi.events]]
name = "NameRenewed"
fragment = "event NameRenewed(string name, bytes32 indexed label, uint256 cost, uint256 expires, bytes32 referrer)"
emitter_roles = ["unwrapped_registrar_controller"]
normalized_events = ["RegistrationRenewed"]
